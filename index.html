<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Camera Module</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.21.4/babel.min.js"></script>
  <style>
    body { margin: 0; background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const Icons = {
      Camera: ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
      Check: ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
      X: ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      ImageIcon: ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    };

    const App = () => {
      const [photo, setPhoto] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);

      // ฟังก์ชันบีบอัดรูปภาพ
      const compressImage = (file, callback) => {
          setIsProcessing(true);
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = event => {
              const img = new Image(); 
              img.src = event.target.result;
              img.onload = () => {
                  const canvas = document.createElement('canvas');
                  const MAX = 800; // ปรับขนาดสูงสุดของรูป (px)
                  let width = img.width; 
                  let height = img.height;
                  
                  if (width > height) { 
                      if (width > MAX) { height *= MAX / width; width = MAX; } 
                  } else { 
                      if (height > MAX) { width *= MAX / height; height = MAX; } 
                  }
                  
                  canvas.width = width; 
                  canvas.height = height;
                  const ctx = canvas.getContext('2d'); 
                  ctx.drawImage(img, 0, 0, width, height);
                  
                  // ได้ภาพ Base64 ออกมา
                  callback(canvas.toDataURL('image/jpeg', 0.7)); 
                  setIsProcessing(false);
              }
          }
      };

      const handleImageUpload = (e) => {
          if(e.target.files[0]) {
              compressImage(e.target.files[0], (compressedData) => { 
                  setPhoto(compressedData); 
              });
          }
      };

      const sendToParent = () => {
          if (!photo) return;
          // ยิงคำสั่ง postMessage กลับไปหาหน้าเว็บ GAS (parent window)
          window.parent.postMessage({
              type: 'CAMERA_SUCCESS',
              payload: photo
          }, '*'); // '*' หมายถึงส่งไปหาใครก็ได้ที่เป็น parent
      };

      return (
        <div className="min-h-screen flex flex-col p-6 items-center justify-center">
            
          {!photo ? (
            <div className="w-full max-w-sm space-y-4">
               <div className="text-center mb-8">
                   <h2 className="text-2xl font-black text-slate-800">อัปโหลดหลักฐาน</h2>
                   <p className="text-slate-500 font-bold text-sm">ถ่ายรูปหรือเลือกรูปจากเครื่องของคุณ</p>
               </div>
               
               <div className="relative">
                 <input type="file" accept="image/*" capture="environment" onChange={handleImageUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                 <div className="bg-blue-50 border-2 border-dashed border-blue-300 rounded-3xl h-40 flex flex-col items-center justify-center text-blue-600 active:scale-95 transition-transform">
                     <Icons.Camera size={40} className="mb-2"/>
                     <span className="font-black text-sm uppercase tracking-widest">ถ่ายรูป (Camera)</span>
                 </div>
               </div>

               <div className="relative">
                 <input type="file" accept="image/*" onChange={handleImageUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                 <div className="bg-slate-50 border-2 border-dashed border-slate-300 rounded-3xl h-24 flex flex-col items-center justify-center text-slate-600 active:scale-95 transition-transform">
                     <Icons.ImageIcon size={24} className="mb-1"/>
                     <span className="font-bold text-xs uppercase tracking-widest">เลือกจากแกลลอรี่</span>
                 </div>
               </div>

               {isProcessing && <p className="text-center text-blue-500 font-bold animate-pulse mt-4">กำลังประมวลผลรูปภาพ...</p>}
            </div>
          ) : (
            <div className="w-full max-w-sm flex flex-col items-center animate-slide-up">
               <div className="w-full rounded-3xl overflow-hidden border-4 border-white shadow-xl mb-6 bg-white">
                   <img src={photo} className="w-full h-64 object-cover" />
               </div>
               
               <div className="flex gap-4 w-full">
                   <button onClick={() => setPhoto(null)} className="flex-1 bg-slate-200 text-slate-700 py-4 rounded-2xl font-black text-sm active:scale-95 transition-transform flex items-center justify-center gap-2">
                       <Icons.X size={18}/> ถ่ายใหม่
                   </button>
                   <button onClick={sendToParent} className="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black text-sm shadow-lg shadow-blue-600/30 active:scale-95 transition-transform flex items-center justify-center gap-2">
                       <Icons.Check size={18}/> ยืนยันใช้รูปนี้
                   </button>
               </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
