<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Camera System - Logistics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.21.4/babel.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background-color: #000; color: white; font-family: sans-serif; overflow: hidden; }
    * { touch-action: manipulation; }
    .camera-button {
      width: 72px; height: 72px; border-radius: 50%; background-color: white; border: 4px solid #cbd5e1;
      display: flex; justify-content: center; align-items: center; cursor: pointer; transition: transform 0.1s;
    }
    .camera-button:active { transform: scale(0.9); background-color: #f8fafc; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icons = {
      Check: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      Refresh: ({ size = 24, className = "" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
      CameraOff: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="2" y1="2" x2="22" y2="22"/><path d="M10.41 10.41a2 2 0 0 0 2.18 2.18"/><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9c0 .55.22 1.05.59 1.41"/><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/></svg>,
      Loader: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    };

    const CameraApp = () => {
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const [photo, setPhoto] = useState(null);
      const [hasError, setHasError] = useState(false);
      const [stream, setStream] = useState(null);
      const [isSubmitting, setIsSubmitting] = useState(false); // เพิ่ม State เช็คการกดซ้ำ

      const startCamera = async () => {
        try {
          if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const mediaStream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
              audio: false
            });
            if (videoRef.current) {
              videoRef.current.srcObject = mediaStream;
            }
            setStream(mediaStream);
            setHasError(false);
          } else {
            setHasError(true);
          }
        } catch (err) {
          console.error("Camera access error:", err);
          setHasError(true);
        }
      };

      const stopCamera = () => {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }
      };

      useEffect(() => {
        startCamera();
        return () => stopCamera();
      }, []);

      const takePhoto = () => {
        if (videoRef.current && canvasRef.current) {
          const video = videoRef.current;
          const canvas = canvasRef.current;
          
          // 1. กำหนดขนาดสูงสุด เพื่อป้องกันไฟล์ใหญ่เกินไป ส่งผ่าน GAS ได้เร็วขึ้น
          const MAX_WIDTH = 1024;
          let width = video.videoWidth;
          let height = video.videoHeight;
          
          if (width > MAX_WIDTH) {
            height = Math.round((height * MAX_WIDTH) / width);
            width = MAX_WIDTH;
          }
          
          canvas.width = width;
          canvas.height = height;
          
          const ctx = canvas.getContext('2d');
          ctx.drawImage(video, 0, 0, width, height);
          
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
          setPhoto(dataUrl);
          
          stopCamera();
        }
      };

      const retakePhoto = () => {
        if (isSubmitting) return; // ล็อกปุ่มถ้ากำลังส่งข้อมูล
        setPhoto(null);
        setIsSubmitting(false);
        startCamera();
      };

      const confirmPhoto = () => {
        // 2. ป้องกันการกดยืนยันซ้ำ
        if (photo && !isSubmitting) {
          setIsSubmitting(true); 
          
          // 3. ระบุ Domain สำหรับ Google Apps Script เพื่อความปลอดภัย
          window.parent.postMessage({
            type: 'CAMERA_SUCCESS',
            payload: photo
          }, 'https://script.google.com');

          // หมายเหตุ: หากใช้งานจริงในโหมดเผยแพร่ของ GAS แล้วเจอปัญหา iframe origin เปลี่ยน 
          // สามารถเปลี่ยนกลับเป็น '*' ได้ แต่ตรวจสอบความถูกต้องข้อมูลในฝั่ง GAS เสมอ
        }
      };

      if (hasError) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center space-y-4">
            <div className="bg-red-500/20 p-6 rounded-full text-red-500"><Icons.CameraOff size={48} /></div>
            <h2 className="text-xl font-bold">ไม่สามารถเข้าถึงกล้องได้</h2>
            <p className="text-slate-400 text-sm">กรุณาตรวจสอบว่าคุณได้อนุญาตให้เว็บไซต์ใช้งานกล้องถ่ายรูปได้ หรือเปิดผ่านเบราว์เซอร์ที่รองรับ</p>
          </div>
        );
      }

      return (
        <div className="h-screen w-screen flex flex-col bg-black relative">
          
          <canvas ref={canvasRef} className="hidden"></canvas>

          <div className="flex-1 relative overflow-hidden flex items-center justify-center">
            {!photo ? (
              <video 
                ref={videoRef} 
                autoPlay 
                playsInline 
                muted 
                className="absolute inset-0 w-full h-full object-cover"
              />
            ) : (
              <img 
                src={photo} 
                className="absolute inset-0 w-full h-full object-contain" 
                alt="Captured Preview" 
              />
            )}
            
            <div className="absolute top-4 left-4 bg-black/50 backdrop-blur px-3 py-1 rounded-full text-[10px] text-white/70 font-mono">
              Live Camera System
            </div>
          </div>

          <div className="h-32 bg-black pb-8 pt-4 flex items-center justify-center px-8 shrink-0">
            {!photo ? (
              <button onClick={takePhoto} className="camera-button shadow-lg shadow-white/20">
                <div className="w-14 h-14 bg-white rounded-full border border-slate-200"></div>
              </button>
            ) : (
              <div className="w-full flex items-center justify-between px-4 max-w-sm mx-auto">
                <button 
                  onClick={retakePhoto} 
                  disabled={isSubmitting}
                  className={`flex flex-col items-center transition-colors ${isSubmitting ? 'text-slate-600 opacity-50 cursor-not-allowed' : 'text-slate-300 hover:text-white'}`}
                >
                  <div className="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center mb-1">
                    <Icons.Refresh size={20} />
                  </div>
                  <span className="text-[10px] font-bold">ถ่ายใหม่</span>
                </button>
                
                <button 
                  onClick={confirmPhoto} 
                  disabled={isSubmitting}
                  className={`flex flex-col items-center transition-all duration-300 ${isSubmitting ? 'text-emerald-700 cursor-wait' : 'text-emerald-400 hover:text-emerald-300'}`}
                >
                  <div className={`w-16 h-16 rounded-full flex items-center justify-center mb-1 text-white transition-colors duration-300 ${isSubmitting ? 'bg-emerald-800' : 'bg-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.4)]'}`}>
                    {isSubmitting ? <Icons.Loader size={32} /> : <Icons.Check size={32} />}
                  </div>
                  <span className={`text-xs font-bold ${isSubmitting ? 'text-emerald-600' : 'text-emerald-500'}`}>
                    {isSubmitting ? 'กำลังส่งข้อมูล...' : 'ใช้รูปนี้'}
                  </span>
                </button>
              </div>
            )}
          </div>
          
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CameraApp />);
  </script>
</body>
</html>
