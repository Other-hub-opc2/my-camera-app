<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Driver App - Logistics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.21.4/babel.min.js"></script>
  <style>
    body { background-color: #f1f5f9; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
    * { touch-action: manipulation; }
    .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icons = {
      Truck: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
      Camera: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
      CheckCircle: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
      MapPin: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
      X: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    };

    const App = () => {
      const [jobData, setJobData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      
      // ฟอร์มเข้าสู่ระบบ
      const [loginForm, setLoginForm] = useState({ plate: '', jobType: 'NORMAL', refNo: '' });
      
      // การทำงานของแต่ละสถานี
      const [activeStep, setActiveStep] = useState(null);
      const [showActionModal, setShowActionModal] = useState(false);
      const [podData, setPodData] = useState({ mileage: '', remark: '', photo: null });
      
      // ระบบซ้อนหน้าต่าง (Iframe) สำหรับกล้อง
      const [showCameraIframe, setShowCameraIframe] = useState(false);
      
      // หน้าต่างจบงานเต็มจอ
      const [showSuccessFullScreen, setShowSuccessFullScreen] = useState(false);

      // ดักฟังข้อมูลรูปภาพที่ส่งกลับมาจากหน้าต่าง GitHub
      useEffect(() => {
        const handleMessage = (event) => {
          // ตรวจสอบว่ามีข้อมูลส่งมาและเป็นประเภทที่เราระบุไว้
          if (event.data && event.data.type === 'CAMERA_SUCCESS') {
            setPodData(prev => ({ ...prev, photo: event.data.payload }));
            setShowCameraIframe(false); // ปิดหน้าต่าง Iframe กล้อง
          }
        };

        window.addEventListener('message', handleMessage);
        return () => window.removeEventListener('message', handleMessage);
      }, []);

      const handleLogin = (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        
        // จำลองการดึงข้อมูลผ่าน GAS (ปรับให้ทำงานกับ code.gs)
        if (typeof google !== 'undefined') {
          google.script.run
            .withSuccessHandler((res) => {
              setLoading(false);
              if (res.success) {
                setJobData(res.jobData);
                checkIfAllDone(res.jobData.steps);
              } else {
                setError(res.message);
              }
            })
            .withFailureHandler((err) => {
              setLoading(false);
              setError(err.message);
            })
            .fetchJobData(loginForm.plate, loginForm.jobType, loginForm.refNo, "");
        } else {
          // สำหรับทดสอบบนคอมพิวเตอร์ตอนที่ไม่ได้รันผ่าน GAS
          setTimeout(() => {
            setLoading(false);
            setJobData({
              jobId: "REF001", route: "กรุงเทพ - ชลบุรี", truck: loginForm.plate,
              steps: [
                { id: 1, location: "คลังสินค้า A", status: "READY" },
                { id: 2, location: "จุดแวะพัก B", status: "PENDING" },
                { id: 3, location: "ปลายทาง C", status: "PENDING" }
              ]
            });
          }, 1000);
        }
      };

      const checkIfAllDone = (steps) => {
        if (!steps) return;
        const allCompleted = steps.every(s => s.status === 'DONE' || s.status === 'SKIPPED');
        if (allCompleted) {
          setShowSuccessFullScreen(true);
        }
      };

      const openActionModal = (stepIndex) => {
        setActiveStep(stepIndex);
        setPodData({ mileage: '', remark: '', photo: null });
        setShowActionModal(true);
      };

      const handleSubmitPod = () => {
        if (!podData.photo) {
          alert('กรุณาถ่ายรูปก่อนบันทึกงาน');
          return;
        }

        setLoading(true);
        const currentStep = jobData.steps[activeStep];
        
        const payload = {
          sheetName: jobData.sheetName || "Sheet1",
          jobId: jobData.jobId,
          jobData: jobData,
          podData: podData,
          locationName: currentStep.location,
          stepIndex: activeStep,
          isFinal: activeStep === jobData.steps.length - 1,
          statusTime: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
          isSkipped: false
        };

        if (typeof google !== 'undefined') {
          google.script.run
            .withSuccessHandler((res) => {
              setLoading(false);
              if (res.success) {
                // อัปเดตสถานะในหน้าจอให้เป็น DONE
                const newSteps = [...jobData.steps];
                newSteps[activeStep].status = 'DONE';
                if (activeStep + 1 < newSteps.length) {
                  newSteps[activeStep + 1].status = 'READY';
                }
                setJobData({ ...jobData, steps: newSteps });
                setShowActionModal(false);
                checkIfAllDone(newSteps);
              } else {
                alert(res.message);
              }
            })
            .submitJobCompletion(payload);
        } else {
          // ทดสอบ Local
          setTimeout(() => {
            setLoading(false);
            const newSteps = [...jobData.steps];
            newSteps[activeStep].status = 'DONE';
            if (activeStep + 1 < newSteps.length) {
              newSteps[activeStep + 1].status = 'READY';
            }
            setJobData({ ...jobData, steps: newSteps });
            setShowActionModal(false);
            checkIfAllDone(newSteps);
          }, 1000);
        }
      };

      const handleFinalComplete = () => {
        // เมื่อกด "กลับหน้าหลัก" บน Popup สีเขียว
        if (typeof google !== 'undefined') {
          google.script.run.updateJobToDone(
            jobData.sheetName, 
            jobData.jobId, 
            new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
          );
        }
        setShowSuccessFullScreen(false);
        setJobData(null); // เคลียร์งาน กลับหน้า Login
      };

      if (!jobData) {
        return (
          <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
            <div className="w-full max-w-sm glass-panel p-8 rounded-3xl shadow-xl space-y-6">
              <div className="flex justify-center text-blue-600 mb-2"><Icons.Truck size={48} /></div>
              <h2 className="text-2xl font-black text-center text-slate-800">เข้าสู่ระบบคนขับ</h2>
              
              <form onSubmit={handleLogin} className="space-y-4">
                <div>
                  <label className="text-xs font-bold text-slate-500 uppercase">ทะเบียนรถ</label>
                  <input type="text" required value={loginForm.plate} onChange={e => setLoginForm({...loginForm, plate: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="เช่น 1กข1234" />
                </div>
                <div>
                  <label className="text-xs font-bold text-slate-500 uppercase">รหัสงาน</label>
                  <input type="text" required value={loginForm.refNo} onChange={e => setLoginForm({...loginForm, refNo: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="เลข Ref No." />
                </div>
                {error && <div className="text-red-500 text-sm font-bold bg-red-50 p-3 rounded-lg">{error}</div>}
                
                <button type="submit" disabled={loading} className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl active:scale-95 transition-transform flex justify-center items-center gap-2 shadow-lg shadow-blue-500/30">
                  {loading ? 'กำลังโหลดข้อมูล...' : 'เริ่มงาน'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen pb-20">
          {/* Header */}
          <div className="bg-white px-6 py-4 shadow-sm sticky top-0 z-10 flex justify-between items-center">
            <div>
              <h1 className="font-black text-lg text-slate-800">ทะเบียน: {jobData.truck}</h1>
              <p className="text-xs text-slate-500">รหัสงาน: {jobData.jobId}</p>
            </div>
            <button onClick={() => setJobData(null)} className="text-xs font-bold text-red-500 px-3 py-1 bg-red-50 rounded-full">ออกระบบ</button>
          </div>

          {/* Timeline */}
          <div className="p-6 max-w-lg mx-auto">
            <div className="relative border-l-2 border-slate-200 ml-3 space-y-8">
              {jobData.steps.map((step, index) => (
                <div key={index} className="relative pl-6">
                  {/* จุด Timeline */}
                  <div className={`absolute -left-[9px] top-1 w-4 h-4 rounded-full border-2 ${step.status === 'DONE' ? 'bg-emerald-500 border-emerald-500' : step.status === 'READY' ? 'bg-blue-500 border-white ring-2 ring-blue-500' : 'bg-slate-200 border-slate-200'}`}></div>
                  
                  <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <h3 className="font-bold text-slate-800 flex items-center gap-2">
                      <Icons.MapPin size={16} className={step.status === 'DONE' ? 'text-emerald-500' : 'text-slate-400'} />
                      {step.location}
                    </h3>
                    <div className="mt-3">
                      {step.status === 'DONE' ? (
                        <span className="text-sm font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full">ทำรายการเสร็จสิ้น</span>
                      ) : step.status === 'READY' ? (
                        <button onClick={() => openActionModal(index)} className="w-full py-2 bg-blue-600 text-white font-bold rounded-lg shadow-md active:scale-95 transition-transform">
                          ดำเนินการ
                        </button>
                      ) : (
                        <span className="text-sm text-slate-400">รอการดำเนินการ</span>
                      )}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Action Modal */}
          {showActionModal && (
            <div className="fixed inset-0 z-40 bg-black/60 flex flex-col justify-end">
              <div className="bg-white rounded-t-3xl p-6 w-full max-w-lg mx-auto">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="font-bold text-xl">สถานะ: {jobData.steps[activeStep].location}</h3>
                  <button onClick={() => setShowActionModal(false)} className="text-slate-400 p-2"><Icons.X /></button>
                </div>

                <div className="space-y-4">
                  <div>
                    <label className="text-xs font-bold text-slate-500">เลขไมล์</label>
                    <input type="number" value={podData.mileage} onChange={e => setPodData({...podData, mileage: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl" placeholder="ระบุเลขไมล์" />
                  </div>
                  
                  {/* ส่วนกล้องถ่ายรูป (มีแค่ปุ่มกล้อง ไม่มีปุ่มแกลลอรีแล้ว) */}
                  <div>
                    <label className="text-xs font-bold text-slate-500 block mb-2">รูปถ่ายหลักฐาน</label>
                    {podData.photo ? (
                      <div className="relative rounded-xl overflow-hidden border-2 border-emerald-500">
                        <img src={podData.photo} className="w-full h-48 object-cover" alt="หลักฐาน" />
                        <button onClick={() => setPodData({...podData, photo: null})} className="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full shadow-lg"><Icons.X size={16}/></button>
                      </div>
                    ) : (
                      <button onClick={() => setShowCameraIframe(true)} className="w-full py-6 border-2 border-dashed border-blue-300 bg-blue-50 text-blue-600 rounded-xl flex flex-col items-center justify-center gap-2 active:bg-blue-100 transition-colors">
                        <Icons.Camera size={32} />
                        <span className="font-bold">เปิดระบบกล้อง</span>
                      </button>
                    )}
                  </div>

                  <div>
                    <label className="text-xs font-bold text-slate-500">หมายเหตุ</label>
                    <input type="text" value={podData.remark} onChange={e => setPodData({...podData, remark: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl" placeholder="เพิ่มหมายเหตุ (ถ้ามี)" />
                  </div>

                  <button onClick={handleSubmitPod} disabled={loading} className="w-full py-4 mt-4 bg-emerald-500 text-white font-bold rounded-xl text-lg shadow-lg shadow-emerald-500/30 active:scale-95 transition-transform">
                    {loading ? 'กำลังบันทึก...' : 'บันทึกรายการ'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Iframe กล้องทับเต็มจอ */}
          {showCameraIframe && (
            <div className="fixed inset-0 z-50 bg-black flex flex-col">
              <div className="flex justify-between items-center p-4 bg-black text-white shrink-0">
                <span className="font-mono text-xs opacity-70">Camera System</span>
                <button onClick={() => setShowCameraIframe(false)} className="bg-slate-800 text-white px-4 py-1.5 rounded-full font-bold text-sm active:bg-slate-700">ปิดกล้อง</button>
              </div>
              
              {/* 🔴 นำลิงก์ GitHub ของคุณมาใส่ตรง src ด้านล่างนี้ */}
              {/* อนุญาตการเข้าถึงกล้องและไมค์ข้ามโดเมนด้วย allow="camera *; microphone *" */}
              <iframe 
                src="https://YOUR_GITHUB_USERNAME.github.io/camera-app/" 
                allow="camera *; microphone *; autoplay *; fullscreen *"
                className="w-full flex-1 border-0 bg-black"
              ></iframe>
            </div>
          )}

          {/* หน้าต่าง "งานสำเร็จเรียบร้อย" บังคับปิดงาน */}
          {showSuccessFullScreen && (
            <div className="fixed inset-0 z-[60] bg-emerald-500 flex flex-col items-center justify-center p-6 text-white text-center">
              <div className="bg-white/20 p-6 rounded-full mb-6">
                <Icons.CheckCircle size={80} />
              </div>
              <h1 className="text-4xl font-black mb-2">งานสำเร็จ!</h1>
              <p className="text-emerald-50 mb-10 opacity-90">คุณได้ทำการเช็คอินครบทุกสถานีเรียบร้อยแล้ว ขอบคุณสำหรับความทุ่มเทในวันนี้</p>
              
              <button onClick={handleFinalComplete} className="w-full max-w-xs py-4 bg-white text-emerald-600 font-bold rounded-full text-lg shadow-xl active:scale-95 transition-transform">
                กลับหน้าหลัก
              </button>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
