<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Camera System - Logistics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.21.4/babel.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background-color: #000; color: white; font-family: sans-serif; overflow: hidden; }
    * { touch-action: manipulation; }
    .camera-button {
      width: 80px; height: 80px; border-radius: 50%; background-color: #3b82f6; 
      display: flex; justify-content: center; align-items: center; cursor: pointer; 
      transition: transform 0.1s, background-color 0.2s;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }
    .camera-button:active { transform: scale(0.95); background-color: #2563eb; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    const Icons = {
      Camera: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9c0 1.1.9 2 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
      Loader: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    };

    const CameraApp = () => {
      const fileInputRef = useRef(null);
      const [isProcessing, setIsProcessing] = useState(false);

      const openNativeCamera = () => {
        if (fileInputRef.current) {
          fileInputRef.current.click();
        }
      };

      const handleFileChange = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        // แสดงหน้าโหลดหมุนๆ
        setIsProcessing(true);

        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_DIMENSION = 1024;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_DIMENSION) {
                height = Math.round((height * MAX_DIMENSION) / width);
                width = MAX_DIMENSION;
              }
            } else {
              if (height > MAX_DIMENSION) {
                width = Math.round((width * MAX_DIMENSION) / height);
                height = MAX_DIMENSION;
              }
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
            
            // ส่งกลับไปที่ GAS ทันทีที่บีบอัดเสร็จ ยิงข้อมูลไปที่ทุกโดเมน '*'
            window.parent.postMessage({
              type: 'CAMERA_SUCCESS',
              payload: compressedDataUrl
            }, '*');
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="h-screen w-screen flex flex-col bg-black relative">
          
          <input 
            type="file" 
            accept="image/*" 
            capture="environment" 
            ref={fileInputRef} 
            onChange={handleFileChange}
            className="hidden"
          />

          <div className="flex-1 relative overflow-hidden flex items-center justify-center bg-slate-900/50">
            <div className="text-center flex flex-col items-center justify-center px-6">
              {isProcessing ? (
                <div className="flex flex-col items-center text-slate-300">
                  <Icons.Loader size={48} />
                  <p className="mt-4 font-bold text-lg">กำลังประมวลผลและส่งภาพ...</p>
                  <p className="text-xs text-slate-500 mt-1">กรุณารอสักครู่...</p>
                </div>
              ) : (
                <div className="flex flex-col items-center">
                  <div className="w-24 h-24 bg-slate-800 rounded-full flex items-center justify-center text-slate-400 mb-6">
                    <Icons.Camera size={40} />
                  </div>
                  <h2 className="text-xl font-bold text-white mb-2">ระบบถ่ายภาพโลจิสติกส์</h2>
                  <p className="text-slate-400 text-sm max-w-xs">กดปุ่มด้านล่างเพื่อเปิดกล้องมือถือ ถ่ายรูปสินค้า หรือเอกสารจัดส่ง</p>
                </div>
              )}
            </div>
          </div>

          <div className="h-32 bg-black pb-8 pt-4 flex items-center justify-center px-8 shrink-0 border-t border-slate-800">
            <button onClick={openNativeCamera} disabled={isProcessing} className={`camera-button flex flex-col items-center justify-center text-white ${isProcessing ? 'opacity-50' : ''}`}>
              <Icons.Camera size={32} />
            </button>
          </div>
          
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CameraApp />);
  </script>
</body>
</html>
